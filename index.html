<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7C2D2D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daily Bread" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <title>Daily Bread</title>
  <style>
    html, body { margin: 0; padding: 0; background: #F4EFE3; }
    #root { min-height: 100vh; }
    /* simple loading state before React mounts */
    .boot { font-family: Georgia, serif; color: #6E655A; text-align: center; padding-top: 40vh; }
  </style>
</head>
<body>
  <div id="root"><div class="boot">Opening your journal…</div></div>

  <!-- React + ReactDOM (production UMD builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone, version-pinned for reproducibility -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Load app.js ourselves, transform with the CLASSIC runtime explicitly,
       and eval. This avoids relying on Babel's default runtime (newer
       versions default to the automatic runtime, which emits import
       statements that fail in a plain script). -->
  <script>
    (function () {
      function boot(source) {
        try {
          var transformed = Babel.transform(source, {
            presets: [["react", { runtime: "classic" }]],
          }).code;
          // eslint-disable-next-line no-eval
          (0, eval)(transformed);
        } catch (e) {
          document.getElementById("root").innerHTML =
            '<div class="boot">Something went wrong starting the app.<br>' +
            "Try reloading. (" + (e && e.message ? e.message : e) + ")</div>";
          console.error(e);
        }
      }
      fetch("app.js")
        .then(function (r) { return r.text(); })
        .then(boot)
        .catch(function (e) {
          document.getElementById("root").innerHTML =
            '<div class="boot">Couldn\'t load the app. Check your connection for the first load.</div>';
          console.error(e);
        });
    })();
  </script>

  <!-- Register the service worker for offline use -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (e) {
          console.warn("Service worker registration failed:", e);
        });
      });
    }
  </script>
</body>
</html>
